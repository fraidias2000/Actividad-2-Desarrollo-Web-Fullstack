server:
  port: 8082

spring:
  application:
    name: orders-service

  datasource:
    url: jdbc:postgresql://localhost:5434/orders_db
    username: orders_user
    password: orders_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    enabled: false
